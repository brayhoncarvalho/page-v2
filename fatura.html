<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFFFFF" />
  <meta name="description" content="C&A Pay – Fatura" />
  <title>C&A Pay — Fatura</title>

  <!-- Google Fonts: Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Estilos -->
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
</head>
<body>

<div class="app-shell" id="app">

  <!-- Status Bar simulada -->
  <div class="status-bar" role="presentation" aria-hidden="true">
    <span class="status-bar__time">14:49</span>
    <div class="status-bar__icons">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="1"  y="16" width="4" height="7" rx="1"/>
        <rect x="7"  y="11" width="4" height="12" rx="1"/>
        <rect x="13" y="6"  width="4" height="17" rx="1"/>
        <rect x="19" y="1"  width="4" height="22" rx="1" opacity="0.25"/>
      </svg>
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
      <div class="status-bar__battery">72</div>
    </div>
  </div>

  <!-- Header -->
  <header class="app-header" role="banner">
    <div class="app-header__brand">
      <div class="app-header__logo-wrapper" aria-label="C&A Pay">
        <img src="logo.png" alt="C&A Pay" />
      </div>
    </div>
    <div class="app-header__actions" role="toolbar" aria-label="Ações do cabeçalho">
      <button class="app-header__icon-btn" aria-label="Fechar" onclick="location.href='index.html'">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Título da página -->
  <div class="page-title" style="padding-bottom: var(--space-3);">
    <h1 class="page-title__text">Extrato</h1>
  </div>

  <!-- Tabs de mês -->
  <div class="month-tabs" role="tablist" aria-label="Selecionar mês da fatura" id="month-tabs">
    <button class="month-tab" role="tab" aria-selected="false" data-month="Dez">Dez</button>
    <button class="month-tab" role="tab" aria-selected="false" data-month="Jan">Jan</button>
    <button class="month-tab" role="tab" aria-selected="false" data-month="Fev">Fev</button>
    <button class="month-tab" role="tab" aria-selected="false" data-month="Mar">Mar</button>
    <button class="month-tab" role="tab" aria-selected="false" data-month="Abr">Abr</button>
    <button class="month-tab" role="tab" aria-selected="false" data-month="Mai">Mai</button>
    <button class="month-tab month-tab--active" role="tab" aria-selected="true" data-month="Jun">Jun</button>
    <button class="month-tab" role="tab" aria-selected="false" data-month="Jul">Jul</button>
  </div>

  <!-- Conteúdo principal rolável -->
  <main class="app-content" id="main-content" tabindex="-1">

    <!-- Hero: status da fatura -->
    <section class="fatura-hero" aria-label="Status da fatura de junho">
      <div class="fatura-hero__icon" aria-hidden="true">
        <!-- Ícone de fatura/boleto -->
        <svg viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <p class="fatura-hero__status">Fatura fechada</p>
      <p class="fatura-hero__date">(Vencimento 15/06/2026)</p>
      <p class="fatura-hero__value-label">Valor da fatura:</p>
      <p class="fatura-hero__value" aria-label="R$ 150,00">R$ 150,00</p>
      <p class="fatura-hero__min">Pagamento mínimo: R$ 25,00</p>
      <a
        href="fatura-pagar.html"
        class="btn-pagar-fatura"
        aria-label="Pagar fatura de R$ 150,00"
      >Pagar fatura</a>
    </section>

    <!-- Total da fatura anterior -->
    <div class="fatura-stat-section" aria-label="Total da fatura anterior">
      <div class="fatura-stat-section__header">
        <span class="fatura-stat-section__title">Total da fatura anterior</span>
        <span class="fatura-stat-section__value">R$ 0,00</span>
      </div>
      <p class="fatura-stat-section__subtitle">Fatura anterior</p>
    </div>

    <!-- Lançamentos -->
    <section aria-label="Lançamentos da fatura">
      <div class="lancamentos-header" aria-hidden="true">Lançamentos</div>

      <!-- Grupo de data: 20/05 -->
      <div class="lancamento-group" aria-label="Lançamentos do dia 20 de maio">
        <span class="lancamento-group__dot" aria-hidden="true"></span>
        <span class="lancamento-group__date">20/05</span>
      </div>
      <div
        class="lancamento-item"
        role="button"
        aria-label="Compra a Vista-C&A - SHOPPING IMPERIAL - R$ 150,00. Ver detalhes"
        tabindex="0"
      >
        <span class="lancamento-item__label">Compra a Vista-C&A<br>SHOPPING IMPERIAL</span>
        <span class="lancamento-item__right">
          <span class="lancamento-item__value">R$ 150,00</span>
          <span class="lancamento-item__chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </span>
        </span>
      </div>

      <div style="height: var(--space-4);"></div>
    </section>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" role="navigation" aria-label="Navegação principal">
    <a
      href="index.html"
      class="bottom-nav__item"
      aria-label="Início"
    >
      <span class="bottom-nav__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </span>
      <span class="bottom-nav__label">Início</span>
    </a>

    <a
      href="fatura.html"
      class="bottom-nav__item bottom-nav__item--active"
      aria-current="page"
      aria-label="Fatura"
    >
      <span class="bottom-nav__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6"  x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </span>
      <span class="bottom-nav__label">Fatura</span>
    </a>

    <a
      href="servicos.html"
      class="bottom-nav__item"
      aria-label="Serviços"
    >
      <span class="bottom-nav__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <rect x="3"  y="3"  width="7" height="7" rx="1"/>
          <rect x="14" y="3"  width="7" height="7" rx="1"/>
          <rect x="3"  y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </span>
      <span class="bottom-nav__label">Serviços</span>
    </a>

    <a
      href="ajuda.html"
      class="bottom-nav__item"
      aria-label="Ajuda"
    >
      <span class="bottom-nav__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </span>
      <span class="bottom-nav__label">Ajuda</span>
    </a>

    <a
      href="perfil.html"
      class="bottom-nav__item"
      aria-label="Perfil"
    >
      <span class="bottom-nav__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
      <span class="bottom-nav__label">Perfil</span>
    </a>
  </nav>

</div><!-- /.app-shell -->

<script src="scripts/app.js"></script>
<script>
  // Interatividade básica das tabs de mês
  document.querySelectorAll('.month-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.month-tab').forEach(function(t) {
        t.classList.remove('month-tab--active');
        t.setAttribute('aria-selected', 'false');
      });
      this.classList.add('month-tab--active');
      this.setAttribute('aria-selected', 'true');
      this.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    });
  });

  // Scroll para a tab ativa no carregamento
  var activeTab = document.querySelector('.month-tab--active');
  if (activeTab) {
    setTimeout(function() {
      activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }, 100);
  }
</script>
</body>
</html>

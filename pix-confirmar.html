<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFFFFF" />
  <meta name="description" content="C&amp;A Pay – Confirmar Pagamento" />
  <title>C&A Pay — Confirmar Pagamento</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
</head>
<body>

<div class="app-shell" id="app">

  <!-- Status Bar -->
  <div class="status-bar" role="presentation" aria-hidden="true">
    <span class="status-bar__time">09:41</span>
    <div class="status-bar__icons">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="1"  y="16" width="4" height="7" rx="1"/>
        <rect x="7"  y="11" width="4" height="12" rx="1"/>
        <rect x="13" y="6"  width="4" height="17" rx="1"/>
        <rect x="19" y="1"  width="4" height="22" rx="1" opacity="0.25"/>
      </svg>
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
      <div class="status-bar__battery">72</div>
    </div>
  </div>

  <!-- Sub-header -->
  <nav class="sub-header" aria-label="Navegação da página">
    <button
      class="sub-header__btn"
      type="button"
      aria-label="Voltar para simulação de parcelas"
      onclick="history.back()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <h1 class="sub-header__title">Confirmar pagamento</h1>

    <button
      class="sub-header__btn"
      type="button"
      aria-label="Fechar e voltar ao início"
      onclick="location.href='index.html'"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </nav>

  <!-- Conteúdo principal (scrollável) -->
  <main class="app-content" id="main-content" tabindex="-1">

    <!-- Resumo da transação -->
    <p class="recipient-label">Recebedor</p>
    <div class="summary-card" role="region" aria-label="Resumo do pagamento">

      <!-- Cabeçalho com destinatário -->
      <div class="summary-card__header">
        <div class="summary-card__avatar" style="background:#0A0A0A;" aria-hidden="true">
          <span style="color:#fff;font-size:20px;font-weight:700;line-height:1;">B</span>
        </div>
        <div>
          <p class="summary-card__recipient-name">Brayhon Oliveira Carvalho</p>
          <p class="summary-card__recipient-key">Pix · CPF: •••.493.219-••</p>
        </div>
      </div>

      <!-- Linhas de detalhe -->
      <div class="summary-row">
        <span class="summary-row__label">Valor</span>
        <span class="summary-row__value" id="summary-valor">R$&nbsp;—</span>
      </div>
      <div class="summary-row">
        <span class="summary-row__label">Parcelas</span>
        <span class="summary-row__value" id="summary-parcelas">—</span>
      </div>
      <div class="summary-row">
        <span class="summary-row__label">Total a pagar</span>
        <span class="summary-row__value summary-row__value--blue" id="summary-total">R$&nbsp;—</span>
      </div>
      <div class="summary-row">
        <span class="summary-row__label">1ª parcela</span>
        <span class="summary-row__value" id="summary-vencimento">—</span>
      </div>

    </div>

    <!-- Entrada do PIN -->
    <section
      id="pin-section"
      class="pin-section"
      aria-label="Entrada de senha"
    >
      <p class="pin-label">Digite sua senha de 6 dígitos</p>
      <div class="pin-dots" role="status" aria-label="Senha" aria-live="polite">
        <span class="pin-dot" aria-hidden="true"></span>
        <span class="pin-dot" aria-hidden="true"></span>
        <span class="pin-dot" aria-hidden="true"></span>
        <span class="pin-dot" aria-hidden="true"></span>
        <span class="pin-dot" aria-hidden="true"></span>
        <span class="pin-dot" aria-hidden="true"></span>
      </div>
    </section>

    <!-- Teclado numérico para o PIN -->
    <div class="numpad" role="group" aria-label="Teclado para senha">
      <button class="numpad__key" type="button" data-key="1" aria-label="1">1</button>
      <button class="numpad__key" type="button" data-key="2" aria-label="2">2</button>
      <button class="numpad__key" type="button" data-key="3" aria-label="3">3</button>
      <button class="numpad__key" type="button" data-key="4" aria-label="4">4</button>
      <button class="numpad__key" type="button" data-key="5" aria-label="5">5</button>
      <button class="numpad__key" type="button" data-key="6" aria-label="6">6</button>
      <button class="numpad__key" type="button" data-key="7" aria-label="7">7</button>
      <button class="numpad__key" type="button" data-key="8" aria-label="8">8</button>
      <button class="numpad__key" type="button" data-key="9" aria-label="9">9</button>
      <button class="numpad__key numpad__key--delete" type="button" data-key="del" aria-label="Apagar dígito">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
          <line x1="18" y1="9" x2="12" y2="15"/>
          <line x1="12" y1="9" x2="18" y2="15"/>
        </svg>
      </button>
      <button class="numpad__key" type="button" data-key="0" aria-label="0">0</button>
      <span  class="numpad__key numpad__key--empty" aria-hidden="true"></span>
    </div>

    <!-- Espaço extra para o scroll -->
    <div class="spacer-bottom"></div>

  </main>

  <!-- Overlay de sucesso (aparece após confirmação do PIN) -->
  <div
    id="success-overlay"
    class="success-overlay"
    role="alert"
    aria-live="assertive"
    aria-label="Pagamento confirmado"
  >
    <div class="success-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <p class="success-title">Pix enviado!</p>
    <p class="success-amount" id="success-amount">R$&nbsp;—</p>
    <p class="success-subtitle">Pagamento realizado com sucesso.<br>Redirecionando para o início…</p>
  </div>

</div>

<script src="scripts/pix.js"></script>
</body>
</html>

<script>
  function confirmarSaida() {
    if (confirm('Deseja sair da sua conta C&A Pay?')) {
      localStorage.removeItem('ceapay_session_active');
      location.href = 'login.html';
    }
  }

  function confirmarResetPix() {
    var stored = parseInt(localStorage.getItem('ceapay_pix_limit') || '100000', 10);
    var atual = isNaN(stored) ? 100000 : stored;
    var fmt = 'R$\u00a0' + (atual / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (confirm('Resetar o limite do Pix Crédito?\nLimite atual: ' + fmt + '\n\nO limite voltará para R$\u00a01.000,00.')) {
      localStorage.removeItem('ceapay_pix_limit');
      var el = document.getElementById('perfil-pix-limite');
      if (el) el.textContent = 'R$\u00a01.000,00';
      alert('Limite resetado com sucesso! R$\u00a01.000,00 disponíveis.');
    }
  }

  function confirmarCancelarPixCredito() {
    var ativo = localStorage.getItem('ceapay_pix_credito_ativo') === 'true';
    if (!ativo) {
      alert('Pix Crédito ainda não está ativo na sua conta.');
      return;
    }
    if (confirm('Deseja cancelar a adesão ao Pix Crédito?\nVocê precisará aceitar os termos novamente para utilizá-lo.')) {
      localStorage.removeItem('ceapay_pix_credito_ativo');
      var statusEl = document.getElementById('perfil-pix-credito-status');
      if (statusEl) statusEl.textContent = 'Inativo';
      alert('Adesão cancelada. O Pix Crédito foi desativado na sua conta.');
    }
  }

  // Exibe o limite atual no item do menu ao carregar
  (function () {
    var el = document.getElementById('perfil-pix-limite');
    if (!el) return;
    var stored = parseInt(localStorage.getItem('ceapay_pix_limit') || '100000', 10);
    var lim = isNaN(stored) || stored < 0 ? 100000 : stored;
    el.textContent = 'R$\u00a0' + (lim / 100).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  })();

  // Exibe status do Pix Crédito ao carregar
  (function () {
    var statusEl = document.getElementById('perfil-pix-credito-status');
    if (!statusEl) return;
    statusEl.textContent = localStorage.getItem('ceapay_pix_credito_ativo') === 'true' ? 'Ativo' : 'Inativo';
  })();
</script>

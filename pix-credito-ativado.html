<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFFFFF" />
  <meta name="description" content="C&amp;A Pay – Pix Crédito ativado" />
  <title>C&A Pay — Pix Crédito Ativado</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
</head>
<body>

<div class="app-shell" id="app">

  <!-- Status Bar -->
  <div class="status-bar" role="presentation" aria-hidden="true">
    <span class="status-bar__time">09:41</span>
    <div class="status-bar__icons">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="1"  y="16" width="4" height="7" rx="1"/>
        <rect x="7"  y="11" width="4" height="12" rx="1"/>
        <rect x="13" y="6"  width="4" height="17" rx="1"/>
        <rect x="19" y="1"  width="4" height="22" rx="1" opacity="0.25"/>
      </svg>
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
      <div class="status-bar__battery">72</div>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <main class="app-content" id="main-content" tabindex="-1">

    <section
      class="activation-screen"
      aria-label="Pix Crédito ativado com sucesso"
      role="status"
      aria-live="polite"
    >

      <!-- Ícone Pix com pulso -->
      <div class="activation-screen__icon" aria-hidden="true">
        <img src="assets/pix.png" alt="" />
      </div>

      <!-- Título -->
      <h1 class="activation-screen__title">Pix Crédito<br>ativado!</h1>

      <!-- Descrição -->
      <p class="activation-screen__desc">
        A partir de agora você pode enviar Pix e parcelar o pagamento usando seu limite C&A Pay.
      </p>

      <!-- CTAs -->
      <div class="activation-screen__cta-stack">
        <button
          class="btn-primary"
          type="button"
          onclick="location.href='pix-chave.html'"
        >
          Usar agora
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

        <button
          class="link-btn"
          type="button"
          onclick="location.href='index.html'"
        >
          Voltar ao início
        </button>
      </div>

    </section>

  </main>

</div><!-- /app-shell -->

<script src="scripts/app.js"></script>
</body>
</html>

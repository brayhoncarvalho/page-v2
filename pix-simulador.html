<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFFFFF" />
  <meta name="description" content="C&amp;A Pay – Simular Parcelas" />
  <title>C&A Pay — Simular Parcelas</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
</head>
<body>

<div class="app-shell" id="app">

  <!-- Status Bar -->
  <div class="status-bar" role="presentation" aria-hidden="true">
    <span class="status-bar__time">09:41</span>
    <div class="status-bar__icons">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="1"  y="16" width="4" height="7" rx="1"/>
        <rect x="7"  y="11" width="4" height="12" rx="1"/>
        <rect x="13" y="6"  width="4" height="17" rx="1"/>
        <rect x="19" y="1"  width="4" height="22" rx="1" opacity="0.25"/>
      </svg>
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
      <div class="status-bar__battery">72</div>
    </div>
  </div>

  <!-- Sub-header -->
  <nav class="sub-header" aria-label="Navegação da página">
    <button
      class="sub-header__btn"
      type="button"
      aria-label="Voltar para entrada de valor"
      onclick="history.back()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <h1 class="sub-header__title">Simular parcelas</h1>

    <button
      class="sub-header__btn"
      type="button"
      aria-label="Fechar e voltar ao início"
      onclick="location.href='index.html'"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </nav>

  <!-- Conteúdo principal (scrollável) -->
  <main class="app-content" id="main-content" tabindex="-1">

    <!-- Destinatário mini -->
    <p class="recipient-label">Recebedor</p>
    <div class="recipient-card" role="region" aria-label="Destinatário do Pix">
      <div class="recipient-card__avatar" style="background:#0A0A0A;" aria-hidden="true">
        <span style="color:#fff;font-size:20px;font-weight:700;line-height:1;">B</span>
      </div>
      <div class="recipient-card__info">
        <span class="recipient-card__name">Brayhon Oliveira Carvalho</span>
        <span class="recipient-card__key">CPF: •••.493.219-••</span>
        <span class="recipient-card__bank">Pessoa Física</span>
      </div>
    </div>

    <!-- Card com valor a ser parcelado -->
    <div class="value-card" role="region" aria-label="Valor a parcelar">
      <span class="value-card__label">Valor</span>
      <span class="value-card__amount" id="value-card-amount">R$&nbsp;500,00</span>
    </div>

    <!-- Label da seção -->
    <span class="content-label">Escolha como pagar</span>

    <!-- Lista de parcelas — populada por pix.js -->
    <div
      id="installment-list"
      role="list"
      aria-label="Opções de parcelamento"
    ></div>

  </main>

  <!-- CTA fixo no rodapé -->
  <div class="cta-footer">
    <button class="btn-primary" type="button" id="btn-pagar">
      Pagar agora
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>

</div>

<script src="scripts/pix.js"></script>
</body>
</html>

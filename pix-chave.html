<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFFFFF" />
  <meta name="description" content="C&amp;A Pay – Pix Crédito" />
  <title>C&A Pay — Pix Crédito</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
</head>
<body>

<div class="app-shell" id="app">

  <!-- Status Bar -->
  <div class="status-bar" role="presentation" aria-hidden="true">
    <span class="status-bar__time">09:41</span>
    <div class="status-bar__icons">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="1"  y="16" width="4" height="7" rx="1"/>
        <rect x="7"  y="11" width="4" height="12" rx="1"/>
        <rect x="13" y="6"  width="4" height="17" rx="1"/>
        <rect x="19" y="1"  width="4" height="22" rx="1" opacity="0.25"/>
      </svg>
      <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
      <div class="status-bar__battery">72</div>
    </div>
  </div>

  <!-- Sub-header -->
  <nav class="sub-header" aria-label="Navegação da página">
    <button
      class="sub-header__btn"
      type="button"
      aria-label="Voltar para Serviços"
      onclick="history.back()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <h1 class="sub-header__title">Pix Crédito</h1>

    <button
      class="sub-header__btn"
      type="button"
      aria-label="Fechar e voltar ao início"
      onclick="location.href='index.html'"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </nav>

  <!-- Conteúdo principal -->
  <main class="app-content" id="main-content" tabindex="-1">

    <!-- Como enviar -->
    <span class="content-label">Como você quer enviar?</span>

    <div class="method-pills" role="group" aria-label="Método de envio">

      <!-- QR Code — indisponível neste demo -->
      <button
        class="method-pill method-pill--disabled"
        type="button"
        disabled
        aria-label="QR Code, indisponível"
      >
        <span class="method-pill__icon" aria-hidden="true">
          <!-- ícone QR Code -->
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
            <rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none"/>
            <rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none"/>
            <line x1="14" y1="14" x2="14" y2="14.01"/>
            <line x1="18" y1="14" x2="18" y2="14.01"/>
            <line x1="21" y1="14" x2="21" y2="14.01"/>
            <line x1="14" y1="18" x2="14" y2="18.01"/>
            <line x1="18" y1="18" x2="18" y2="18.01"/>
            <line x1="21" y1="21" x2="21" y2="21.01"/>
            <line x1="14" y1="21" x2="14" y2="21.01"/>
            <line x1="18" y1="21" x2="18" y2="21.01"/>
          </svg>
        </span>
        QR Code
      </button>

      <!-- Chave Pix — ativo e pré-preenchido -->
      <button
        class="method-pill method-pill--active"
        type="button"
        aria-label="Chave Pix, selecionado"
        aria-pressed="true"
      >
        <span class="method-pill__icon" aria-hidden="true">
          <!-- ícone chave -->
          <svg viewBox="0 0 24 24">
            <circle cx="7.5" cy="15.5" r="5.5"/>
            <path d="M21 2l-9.6 9.6"/>
            <path d="M15.5 7.5l3 3L22 7l-3-3"/>
          </svg>
        </span>
        Chave Pix
      </button>

    </div>

    <!-- Campo da chave Pix pré-preenchida -->
    <div class="key-input-section">
      <label class="key-type-label" for="pix-key">Chave&nbsp;·&nbsp;CPF</label>
      <input
        type="text"
        id="pix-key"
        class="key-input"
        value="300.493.219-93"
        readonly
        aria-label="Chave Pix CPF pré-preenchida"
        aria-readonly="true"
      />
    </div>

    <!-- Recebedor verificado -->
    <p class="recipient-label">Recebedor</p>

    <div class="recipient-card" role="region" aria-label="Dados do recebedor">
      <div class="recipient-card__avatar" style="background:#0A0A0A;" aria-hidden="true">
        <span style="color:#fff;font-size:20px;font-weight:700;line-height:1;">B</span>
      </div>
      <div class="recipient-card__info">
        <span class="recipient-card__name">
          Brayhon Oliveira Carvalho
          <span class="verified-badge" aria-label="Chave verificada">✓&nbsp;Verificado</span>
        </span>
        <span class="recipient-card__key">CPF: •••.493.219-••</span>
        <span class="recipient-card__bank">Pessoa Física</span>
      </div>
    </div>

  </main>

  <!-- CTA fixo -->
  <div class="cta-footer">
    <button
      class="btn-primary"
      type="button"
      onclick="location.href='pix-entrada.html'"
    >
      Continuar
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </div>

</div>

<script src="scripts/pix.js"></script>
</body>
</html>
